<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rumina 鬼教官</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // アクセント緑を太陽光アプリ（Dr.Rumina系）のブランドグリーンに寄せる（emeraldスケールを一括差し替え）
  tailwind.config = { theme: { extend: { colors: { emerald: {
    50:'#eaf6ee', 100:'#d6ecdd', 200:'#c2e3cd', 300:'#8fd0a6', 400:'#2fae5f',
    500:'#159947', 600:'#0f7a45', 700:'#0F5132', 800:'#0e3d29', 900:'#0b2e20'
  } } } } };
</script>
<style>
  body{background:#F7FBF9;color:#171717;font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cfe3d6;border-radius:5px}
  .nav-active{color:#159947 !important;background:#eaf6ee}
  /* 太陽光アプリに寄せた質感：主要ボタンは緑グラデ、サイドバー/ヘッダーは白 */
  .bg-emerald-500{background-image:linear-gradient(90deg,#16A34A,#0F7A45) !important}
  .bg-emerald-500:hover,.hover\:bg-emerald-400:hover{background-image:linear-gradient(90deg,#12833d,#0c633a) !important}
  aside.app-chrome,header.app-chrome{background:#ffffff}
  #app{animation:fade .25s ease}@keyframes fade{from{opacity:0}to{opacity:1}}
  .navlink{display:block;width:100%;text-align:left;padding:.5rem .75rem;border-radius:.5rem;color:#525252;font-size:.875rem;transition:background .15s,color .15s}
  .navlink:hover{color:#171717;background:#f5f5f5}
  body.logged-out .app-chrome{display:none !important}
  @media print {
    .app-chrome{display:none !important}
    .no-print{display:none !important}
    main{max-width:none !important;padding:0 !important}
    #submitSheet{border:none !important}
  }
</style>

<div class="min-h-screen flex">
  <!-- サイドバー：稼働の流れ順 -->
  <aside class="app-chrome hidden md:flex flex-col w-56 border-r border-neutral-200 p-4 sticky top-0 h-screen">
    <div class="px-3 py-2 mb-3">
      <div class="text-sm font-semibold text-neutral-900">Rumina</div>
      <div class="text-xs text-emerald-600">鬼教官</div>
    </div>
    <div class="px-3 text-[10px] font-semibold text-neutral-400 tracking-wide mb-1">日々の流れ</div>
    <nav class="space-y-0.5">
      <button data-nav="my" onclick="nav('my')" class="navlink">マイページ</button>
      <button data-nav="goal" onclick="nav('goal')" class="navlink">① 目標設定</button>
      <button data-nav="upload" onclick="nav('upload')" class="navlink">② 稼働終了・録音を出稿</button>
      <button data-nav="report" onclick="nav('report')" class="navlink">③ 分析レポート</button>
      <button data-nav="submit" onclick="nav('submit')" class="navlink">④ 上長へ提出書</button>
    </nav>
    <div data-owner class="px-3 text-[10px] font-semibold text-neutral-400 tracking-wide mb-1 mt-4">管理（管理者のみ）</div>
    <nav class="space-y-0.5">
      <button data-owner data-nav="home" onclick="nav('home')" class="navlink">チームホーム</button>
      <button data-owner data-nav="issues" onclick="nav('issues')" class="navlink">イシュー・改善提案</button>
      <button data-owner data-nav="reps" onclick="nav('reps')" class="navlink">営業マン一覧</button>
      <button data-owner data-nav="admin" onclick="nav('admin')" class="navlink">管理者マスタ（名簿編集）</button>
    </nav>
    <div id="userBadge" class="mt-auto px-3 pt-4 space-y-0.5"></div>
  </aside>

  <div class="flex-1 min-w-0">
    <header class="app-chrome md:hidden sticky top-0 z-20 flex items-center justify-between gap-2 px-4 py-3 border-b border-neutral-200 bg-white/90 backdrop-blur">
      <div><span class="text-sm font-semibold text-neutral-900">Rumina</span> <span class="text-xs text-emerald-600">鬼教官</span></div>
      <button onclick="doLogout()" class="text-[11px] text-neutral-500 underline">ログアウト</button>
    </header>
    <main class="max-w-5xl mx-auto px-5 md:px-10 py-8 pb-28 md:pb-12"><div id="app"></div></main>
  </div>
</div>

<!-- モバイル下部ナビ -->
<nav class="app-chrome md:hidden fixed bottom-0 inset-x-0 z-30 grid grid-cols-5 border-t border-neutral-200 bg-white/95 backdrop-blur text-[10px] text-center">
  <button data-nav="my" onclick="nav('my')" class="py-2.5 text-neutral-500">マイ</button>
  <button data-nav="goal" onclick="nav('goal')" class="py-2.5 text-neutral-500">目標</button>
  <button data-nav="upload" onclick="nav('upload')" class="py-2.5 text-neutral-500">出稿</button>
  <button data-nav="report" onclick="nav('report')" class="py-2.5 text-neutral-500">分析</button>
  <button data-owner data-nav="admin" onclick="nav('admin')" class="py-2.5 text-neutral-500">管理</button>
</nav>

<script src="data.js"></script>
<script src="diagnose.js"></script>
<script src="goals.js"></script>
<script src="issues.js"></script>
<script src="charts.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
